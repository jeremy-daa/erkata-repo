services:
  redis:
    image: redis:7-alpine
    container_name: redis_erkata_production
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --save 60 1 
      --loglevel notice 
      --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  redis_data:
    driver: local